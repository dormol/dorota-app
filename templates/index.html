<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Art Mentor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Your Art Mentor</h1>

        <p class="subtitle">
            Built by Dorota Mol @ Molgallery
        </p>

        <div class="upload-box">
            <form method="POST" enctype="multipart/form-data">
                <input type="file" name="image" required>
                <button type="submit">Analyze Artwork</button>
            </form>
        </div>

        {% if note %}
        <div class="result-card">
            <h2>Artistic Interpretation</h2>
            <p>{{ note }}</p>
        </div>
        {% endif %}

    </div>

</body>
</html>
